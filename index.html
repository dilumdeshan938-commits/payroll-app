<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Payroll App</title>
</head>
<body>
    <header>
        <h1>Payroll Management</h1>
        <nav>
            <a href="/">Home</a>
            <!-- Removed History Navigation Button -->
        </nav>
    </header>
    <main>
        <section>
            <h2>Final Results</h2>
            <table>
                <thead>
                    <tr>
                        <th>Select</th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Bank Name</th>
                        <th>Bank Account No</th>
                        <th>Net Pay</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Assuming payrollData is already defined in the existing logic and holds employee data -->
                    {% for employee in payrollData %}
                    <tr>
                        <td><input type="checkbox" class="rowSelect" data-id="{{ employee.id }}"></td>
                        <td>{{ employee.id }}</td>
                        <td>{{ employee.name }}</td>
                        <td>{{ employee.bankName }}</td>
                        <td>{{ employee.bankAccountNo }}</td>
                        <td>{{ employee.netPay }}</td>
                        <td>
                            <button class="editBtn" data-id="{{ employee.id }}">Edit</button>
                            <button class="deleteBtn" data-id="{{ employee.id }}">Delete</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button id="exportBtn">Export Selected to Excel</button>
        </section>
        <script src="scripts.js"></script>
    </main>
</body>
</html>
