<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <!-- Removed History Navigation -->
    </nav>
    <h1>Final Results</h1>
    <table>
        <thead>
            <tr>
                <th><input type="checkbox" id="selectAll" onclick="toggleAll()"></th>
                <th>ID</th>
                <th>Name</th>
                <th>Bank Name</th>
                <th>Bank Account No</th>
                <th>Net Pay</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="employeeTable">
            <!-- Dynamic Row Listing (1-100+ employees) -->
            <!-- Example Row -->
            <tr>
                <td><input type="checkbox" class="empCheckbox"></td>
                <td>1</td>
                <td>John Doe</td>
                <td>Bank A</td>
                <td>123456789</td>
                <td>$1000</td>
                <td>
                    <button onclick="editEmployee(1)">Edit</button>
                    <button onclick="deleteEmployee(1)">Delete</button>
                </td>
            </tr>
            <!-- Repeat for other employees -->
        </tbody>
    </table>
    <button id="exportBtn" onclick="exportToExcel()">Export Selected to Excel</button>

    <script>
        function toggleAll() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.empCheckbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAllCheckbox.checked;
            });
        }
        function exportToExcel() {
            // Functionality to export selected rows to Excel
            alert('Exporting selected rows...');
        }
        function editEmployee(id) {
            // Functionality to edit employee details
            alert('Editing employee with ID: ' + id);
        }
        function deleteEmployee(id) {
            // Functionality to delete employee
            alert('Deleting employee with ID: ' + id);
        }
    </script>
</body>
</html>
